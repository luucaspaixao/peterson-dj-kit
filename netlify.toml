[build]
  command = "node build.js"
  publish = "dist"

# Redireciona o painel admin
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

# Headers de segurança
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
